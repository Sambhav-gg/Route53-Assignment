# Route 53 Clone — single-origin reverse proxy
# Install to: /etc/nginx/sites-available/route53  (then symlink into sites-enabled)
#
# Serving the frontend and the API from ONE origin means the session cookie
# "just works" and no CORS is needed. nginx routes /api/* to FastAPI and
# everything else to the Next.js server.

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or the EC2 public DNS name. "_" matches any host.
    server_name _;

    client_max_body_size 5m;

    # ── API → FastAPI (uvicorn on 127.0.0.1:8000) ──
    # The /api prefix is preserved and forwarded as-is (FastAPI mounts under /api).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else → Next.js (next start on 127.0.0.1:3000) ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
